name: Changelog link check

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  pull-requests: write
  contents: read

jobs:
  check_pull_request:
    name: Check files for broken links
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        sparse-checkout: |
          test/data
    - name: Validate files
      id: validate
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        changeLogDirectory: test/data
      uses: microsoftgraph/changelog-link-check@main

